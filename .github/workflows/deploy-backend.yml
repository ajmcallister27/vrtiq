name: Deploy Backend to Oracle

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: oracle-backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT || 22 }}
          script_stop: true
          script: |
            set -Eeuo pipefail
            cd /srv/vrtiq/app
            bash ./backend/deploy/deploy.sh
